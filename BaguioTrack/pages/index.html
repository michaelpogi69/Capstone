<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baguio Track | Login</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<section id="login-section">
    <div class="login-container">
      <img src="../assets/images/logo.png" alt="Baguio Track Logo" class="logo" />
      <h1>Baguio Track</h1>
      <p>Access your account to start exploring.</p>

      <form id="loginForm">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />

        <button type="submit">Sign In</button>

        <p class="register-link">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
      </form>
    </div>
  </section>

  <!-- 🔥 FIREBASE LOGIN (GMAIL ONLY) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPFnyJC66A-HQC3dKCQQ4SobAFRezx7fU",
      authDomain: "baguio-track-c702f.firebaseapp.com",
      projectId: "baguio-track-c702f",
      storageBucket: "baguio-track-c702f.firebasestorage.app",
      messagingSenderId: "27598181344",
      appId: "1:27598181344:web:97bf7dd2a32dbfe14ed185"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      // ✅ Gmail only
      if (!email.endsWith("@gmail.com")) {
        alert("❌ Only Gmail accounts (@gmail.com) are allowed.");
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("✅ Login successful!");
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "home.html";
        })
        .catch((error) => {
          alert("❌ " + error.code + " — " + error.message);
          console.log(error);
        });
    });
  </script>

</body>
</html>
